<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CommandCenter — Video Converter & RTMP Streamer control panel">
    <title>CommandCenter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <div class="logo-mark">⚡</div>
            <h1>CommandCenter</h1>
            <span class="version-badge">v1.0</span>
        </div>
        <div class="header-right">
            <div class="system-status" id="system-status">
                <span class="status-dot" id="ffmpeg-dot"></span>
                <span class="status-label">FFmpeg</span>
                <span class="status-dot" id="mediamtx-dot"></span>
                <span class="status-label">MediaMTX</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="app-main">
        <!-- LEFT PANEL: Converter (40%) -->
        <section class="panel panel-converter" id="panel-converter">
            <div class="panel-header">
                <h2>Converter</h2>
                <span class="panel-subtitle">Video → TS</span>
            </div>

            <!-- Folder Selector -->
            <div class="card folder-selector">
                <div class="input-group">
                    <input type="text" id="converter-folder" placeholder="Select source folder..." readonly>
                    <button class="btn btn-secondary" id="converter-browse-btn" title="Browse">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h3.879a1.5 1.5 0 0 1 1.06.44l1.122 1.12A1.5 1.5 0 0 0 9.62 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9z"/></svg>
                    </button>
                </div>
                <div class="action-row">
                    <button class="btn btn-primary" id="convert-all-btn" disabled>
                        Convert All
                    </button>
                    <span class="file-counter" id="converter-counter">No files</span>
                </div>
            </div>

            <!-- File List -->
            <div class="file-list" id="converter-file-list">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <p>Select a folder to scan for video files</p>
                </div>
            </div>
        </section>

        <!-- RIGHT PANEL: Streamer (60%) -->
        <section class="panel panel-streamer" id="panel-streamer">
            <div class="panel-header">
                <h2>Streamer</h2>
                <span class="panel-subtitle">RTMP Broadcast</span>
            </div>

            <!-- Folder Selector + Controls -->
            <div class="card streamer-controls">
                <div class="input-group">
                    <input type="text" id="streamer-folder" placeholder="Select content folder..." readonly>
                    <button class="btn btn-secondary" id="streamer-browse-btn" title="Browse">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h3.879a1.5 1.5 0 0 1 1.06.44l1.122 1.12A1.5 1.5 0 0 0 9.62 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9z"/></svg>
                    </button>
                </div>

                <!-- FIX: Side-by-side Protocol and Port Range inputs -->
                <div class="port-range-row" style="display: flex; gap: 16px;">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px;">Protocol</label>
                        <select id="stream-protocol" style="width: 50%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); font-family: inherit; font-size: 0.95rem;">
                            <option value="rtmp">RTMP</option>
                            <option value="hls">HLS</option>
                        </select>
                    </div>
                    <div style="flex: 2;">
                        <label style="display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px;">Port Range</label>
                        <div class="port-inputs">
                            <input type="number" id="port-start" value="1935" min="1024" max="65535">
                            <span class="port-sep">—</span>
                            <input type="number" id="port-end" value="1944" min="1024" max="65535">
                        </div>
                    </div>
                </div>

                <div class="action-row">
                    <button class="btn btn-accent" id="stream-start-btn" disabled>
                        <span class="btn-icon">▶</span> Start Streaming
                    </button>
                    <button class="btn btn-danger" id="stream-stop-btn" disabled>
                        <span class="btn-icon">⏹</span> Stop
                    </button>
                    <div class="stream-status-badge" id="stream-status-badge">
                        Idle
                    </div>
                </div>
            </div>

            <!-- Stream errors -->
            <div class="stream-errors" id="stream-errors" style="display: none;"></div>

            <!-- Folder List -->
            <div class="folder-list" id="streamer-folder-list">
                <div class="empty-state">
                    <div class="empty-icon">📡</div>
                    <p>Select a content folder to discover date-range subfolders</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Folder Browser Modal -->
    <div class="modal-overlay" id="folder-modal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>Browse Folders</h3>
                <button class="modal-close" id="modal-close-btn">✕</button>
            </div>
            <div class="modal-breadcrumb" id="modal-breadcrumb"></div>
            <div class="modal-body" id="modal-body">
                <div class="modal-loading">Loading...</div>
            </div>
            <div class="modal-footer">
                <span class="modal-selected-path" id="modal-selected-path">No folder selected</span>
                <button class="btn btn-primary" id="modal-select-btn" disabled>Select</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
